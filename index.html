<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix-Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/trends.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/hero.css">
    

</head>
<body>
    <header>
        <div class="header-container">
            <div class="brand-logo">
                <img class="netflix-logo" src="assets/icons/netflix-logo.svg" alt="Netflix logo">
            </div>
            <div class="right-header">
                <input type="checkbox" id="language-toggle" class="dropdown-checkbox">
                <label for="language-toggle" class="dropdown-label">
                    <div class="select-language-container">
                        <img class="language-icon" src="assets/icons/language-icon.svg">
                        <div class="current-language">
                            English
                        </div>
                        <img class="dropdown-menu-icon" src="assets/icons/dropdown-icon.svg">
                        <ul class="language-dropdown-menu">
                            <li><a href="#">English</a></li>
                            <li><a href="#">हिन्दी</a></li>
                            <li><a href="#">日本語</a></li>
                        </ul>
                    </div>
                </label>
                
                <button class="sign-in-button">
                    Sign In
                </button>
            </div>
        </div>
    </header>

    <div class="hero-section">
        <img src="assets/images/hero-banner.jpg" class="hero-banner">
        <div class="hero-overlay"></div>

        <div class="hero-info">

            <h1 class="hero-title">
                Unlimited movies, show, and more
            </h1>

            <h2 class="hero-subtitle">
                Starts at ₹149. Cancel at any time.
            </h2>

            <p class="hero-description">
                Ready to watch? Enter your email to create or restart your membership.
            </p>

            <div class="hero-signup-container">
                <div class="hero-input-box">
                    <input type="email" id="input-email-id" class="email-input" placeholder=" " required>
                    <label for="input-email-id" class="email-label">
                        Email Address
                    </label>
                </div>

                <button class="hero-get-started-button">
                    Get Started
                    <img class="get-started-icon" src="assets/icons/angle-right-solid-full.svg" alt="">
                </button>
            </div>
        </div>


        
        <div class="hero-curve-container">
            <div class="hero-curve">
            </div>
        </div>
        <div class="glow"></div>
        

    </div>

    <main>
        <section class="treanding-section">
            <div class="trending-section">
                <h2>Trending Now</h2>
                <div class="trends-container">
                    <button class="trends-scroll-left-button">
                        <img src="assets/icons/angle-left-solid-full.svg">
                    </button>
                    <div class="trends-row">
                        <div class="show-card">
                            <img class="show-poster" src="assets/images/show1.webp">
                            <img class="rank-number" src="assets/icons/1.svg">
                        </div>
                        <div class="show-card">
                            <img class="show-poster" src="assets/images/show2.webp">
                            <img class="rank-number" src="assets/icons/2.svg">
                        </div>
                        <div class="show-card">
                            <img class="show-poster" src="assets/images/show3.webp">
                            <img class="rank-number" src="assets/icons/3.svg">
                        </div>
                        <div class="show-card">
                            <img class="show-poster" src="assets/images/show4.webp">
                            <img class="rank-number" src="assets/icons/4.svg">
                        </div>
                        <div class="show-card">
                            <img class="show-poster" src="assets/images/show5.webp">
                            <img class="rank-number" src="assets/icons/5.svg">
                        </div>
                        <div class="show-card">
                            <img class="show-poster" src="assets/images/show6.webp">
                            <img class="rank-number" src="assets/icons/6.svg">
                        </div>
                        <div class="show-card">
                            <img class="show-poster" src="assets/images/show7.webp">
                            <img class="rank-number" src="assets/icons/7.svg">
                        </div>
                        <div class="show-card">
                            <img class="show-poster" src="assets/images/show8.webp">
                            <img class="rank-number" src="assets/icons/8.svg">
                        </div>
                        <div class="show-card">
                            <img class="show-poster" src="assets/images/show9.webp">
                            <img class="rank-number" src="assets/icons/9.svg">
                        </div>
                        <div class="show-card">
                            <img class="show-poster" src="assets/images/show10.webp">
                            <img class="rank-number" src="assets/icons/10.svg">
                        </div>
                    </div>
                    <button class="trends-scroll-right-button">
                        <img src="assets/icons/angle-right-solid-full.svg">
                    </button>
                </div>
                
            </div>
            
        </section>
        <section class="features-section">
            <h2>More reasons to join</h2>
            <div class="features-bar">
                <div class="feature-card">
                    <div class="feature-glow"></div>
                    <h2>Enjoy on your TV</h2>
                    <p>
                        Watch on smart TVs, PlayStation, Xbox, Chromecast, Apple TV, 
                        Blu-ray players and more.
                    </p>
                    <img src="assets/icons/tv-svg.svg" alt="television SVG" width="72">
                </div>
            </div>

        </section>
    </main>

</body>
</html>
